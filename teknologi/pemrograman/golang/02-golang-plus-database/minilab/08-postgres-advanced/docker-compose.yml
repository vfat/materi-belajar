services:
  postgres:
    image: postgres:16-alpine
    container_name: golang_postgres_advanced
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: golang_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_adv_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d golang_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_adv_data:
    driver: local
